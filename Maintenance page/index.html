<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Under Maintenance</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #db6607;
        color: #333;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container {
        max-width: 600px;
        padding: 20px;
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #d9534f;
        margin-bottom: 20px;
      }
      p {
        font-size: 18px;
        margin-bottom: 30px;
      }
      .links {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }
      .link-button {
        display: inline-block;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s;
      }
      .link-button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://carlostocaofficial.x02.me/i/Q7WSW.jpg"
        alt="Logo"
        style="max-width: 400px; height: auto; margin-bottom: 20px"
      />
      <br />
      <img
        src="https://img.freepik.com/free-vector/construction-road-repair-yellow-black-barrier-sign-realistic-vector-illustration_1284-84524.jpg"
        alt="Construction Barrier"
        style="max-width: 200px; height: auto; margin-bottom: 20px"
      />
      <h1>Site Under Maintenance</h1>
      <p>
        This site is currently being upgraded.
        <br />
        Please check back soon!
      </p>
      <p>In the meantime, please visit these resources:</p>
      <div class="links">
        <a
          href="https://www.imdb.com/name/nm14775474/"
          class="link-button"
          target="_blank"
          >IMDb Profile</a
        >
        <a
          href="https://www.bgency-actors.com/"
          class="link-button"
          target="_blank"
          >Bgency Profile</a
        >
        <a
          href="https://www.youtube.com/@carlostoca4993"
          class="link-button"
          target="_blank"
          >YouTube Channel</a
        >
      </div>
    </div>
  </body>
</html>
